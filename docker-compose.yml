version: '3.8'

services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  web_research:
    build: .
    image: enterprise-research-agent:latest
    container_name: web_research_agent
    command: python -m agents.web_research.a2a_server
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8001/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  rag_knowledge:
    image: enterprise-research-agent:latest
    container_name: rag_knowledge_agent
    command: python -m agents.rag_knowledge.a2a_server
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    depends_on:
      - web_research
      - qdrant
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8002/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  market_data:
    image: enterprise-research-agent:latest
    container_name: market_data_agent
    command: python -m agents.market_data.a2a_server
    ports:
      - "8003:8003"
    env_file:
      - .env
    depends_on:
      - web_research
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8003/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  report_synthesis:
    image: enterprise-research-agent:latest
    container_name: report_synthesis_agent
    command: python -m agents.report_synthesis.a2a_server
    ports:
      - "8004:8004"
    env_file:
      - .env
    depends_on:
      - web_research
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8004/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  ui:
    image: enterprise-research-agent:latest
    container_name: research_ui
    command: python -m streamlit run ui/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      WEB_RESEARCH_URL: http://web_research:8001
      RAG_KNOWLEDGE_URL: http://rag_knowledge:8002
      MARKET_DATA_URL: http://market_data:8003
      REPORT_SYNTHESIS_URL: http://report_synthesis:8004
      REDIS_URL: redis://redis:6379
    depends_on:
      - web_research
      - rag_knowledge
      - market_data
      - report_synthesis
    restart: unless-stopped

volumes:
  qdrant_data:
  redis_data:
